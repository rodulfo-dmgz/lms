<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KPI Lab — Espace immersif d'apprentissage des indicateurs clés de performance">
  <meta name="theme-color" content="#0f1117">

  <title>KPI Lab</title>

  <!-- Favicon inline SVG -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>📊</text></svg>">

  <!-- Polices -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- CSS KPI -->
  <link rel="stylesheet" href="css/kpi.css">

  <!-- Sécurité CSP (prod — à activer si GitHub Pages) -->
  <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com https://fonts.googleapis.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src https://iomzcbmyzjwtswrkvxqk.supabase.co wss://iomzcbmyzjwtswrkvxqk.supabase.co; font-src 'self' https://fonts.gstatic.com;"> -->
</head>
<body>
  <!-- Conteneur principal de la SPA -->
  <div id="kpi-app">
    <!-- Écran de démarrage (remplacé par l'app au boot) -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;">
      <div style="font-size:4rem;animation:none">📊</div>
      <div style="width:40px;height:40px;border:3px solid #334155;border-top-color:#6366f1;border-radius:50%;animation:kpi-spin .8s linear infinite"></div>
      <style>@keyframes kpi-spin{to{transform:rotate(360deg)}}</style>
    </div>
  </div>

  <!-- Lucide init (runtime) -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });
    // Re-run lucide après chaque mutation DOM importante
    const _lucideObserver = new MutationObserver(() => {
      if (window.lucide) lucide.createIcons();
    });
    _lucideObserver.observe(document.body, { subtree: true, childList: true });
  </script>

  <!-- App principale (ES Module) -->
  <script type="module" src="js/kpi-app.js"></script>
</body>
</html>
