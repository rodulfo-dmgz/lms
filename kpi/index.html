<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KPI Lab — Espace immersif d'apprentissage des indicateurs clés de performance">
  <meta name="theme-color" content="#1f4590">
  <title>KPI Lab — DASHBOA_RD</title>

  <!-- Favicon identique au LMS -->
  <link rel="icon" type="image/svg+xml" href="../assets/icons/icon.svg">

  <!-- ══ Anti-flash thème : MÊME logique que le LMS (rd-theme key partagée) ══ -->
  <script>
    (function(){
      const t = localStorage.getItem('rd-theme');
      const sysDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
      // KPI Lab : dark par défaut si aucune préférence enregistrée
      const isDark = t ? t === 'dark' : sysDark !== false;
      if (isDark) document.documentElement.classList.add('dark');
    })();
  </script>

  <!-- Polices — même stack que le LMS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

  <!-- Driver.js — onboarding guidé -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css">
  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js"></script>

  <!-- CSS KPI -->
  <link rel="stylesheet" href="css/kpi.css">
</head>
<body>
  <div id="kpi-app">
    <!-- Écran de démarrage — remplacé par l'app au boot -->
    <div class="kpi-boot-screen">
      <div class="kpi-boot-logo">
        <i class="ph-fill ph-chart-bar"></i>
      </div>
      <div class="kpi-spinner"></div>
    </div>
  </div>

  <!-- App principale (ES Module) -->
  <script type="module" src="js/kpi-app.js?v=4"></script>
</body>
</html>
